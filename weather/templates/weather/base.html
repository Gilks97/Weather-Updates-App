{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Peeps{% endblock %}</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'weather/css/style.css' %}">

    {% block extra_head %}{% endblock %}
</head>
<body {% block body_attrs %}{% endblock %}>

    <nav class="navbar">
        <div class="navbar-brand">🌤️ Peeps</div>
        <span class="navbar-tagline">Your weather, simplified</span>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>
            &copy; {% now "Y" %}
            <a href="https://g-moseti.vercel.app/" target="_blank" rel="noopener noreferrer" class="footer-link">
                Gilks97
            </a>
            &middot; Powered by OpenWeather API
        </p>
    </footer>

    {% block extra_scripts %}{% endblock %}

    <!-- Weather Animation Engine -->
    <script>
        function rand(min, max) {
            return Math.random() * (max - min) + min;
        }

        const starsContainer = document.getElementById('stars-container');
        if (starsContainer) {
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                const size = rand(1, 3);
                star.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    top: ${rand(0, 70)}%;
                    left: ${rand(0, 100)}%;
                    animation-duration: ${rand(1.5, 3.5)}s;
                    animation-delay: ${rand(0, 2)}s;
                `;
                starsContainer.appendChild(star);
            }
        }

        const rainContainer = document.getElementById('rain-container');
        if (rainContainer) {
            const isHeavy = rainContainer.classList.contains('heavy');
            for (let i = 0; i < (isHeavy ? 60 : 40); i++) {
                const drop = document.createElement('div');
                drop.classList.add('rain-drop');
                if (rainContainer.dataset.nightrain) drop.classList.add('night-rain');
                drop.style.cssText = `
                    left: ${rand(0, 100)}%;
                    height: ${rand(15, 30)}px;
                    width: ${rand(1, 2.5)}px;
                    animation-duration: ${rand(0.5, 1.2)}s;
                    animation-delay: ${rand(0, 1.5)}s;
                    opacity: ${rand(0.4, 0.8)};
                `;
                rainContainer.appendChild(drop);
            }
        }

        const snowContainer = document.getElementById('snow-container');
        if (snowContainer) {
            for (let i = 0; i < 25; i++) {
                const flake = document.createElement('div');
                flake.classList.add('snowflake');
                flake.textContent = '❄';
                flake.style.cssText = `
                    left: ${rand(0, 100)}%;
                    font-size: ${rand(0.7, 1.6)}rem;
                    animation-duration: ${rand(5, 10)}s;
                    animation-delay: ${rand(0, 4)}s;
                    opacity: ${rand(0.5, 0.9)};
                `;
                snowContainer.appendChild(flake);
            }
        }
    </script>

</body>
</html>
